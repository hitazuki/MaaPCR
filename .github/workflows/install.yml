name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    strategy:
      matrix:
        include: 
          # Windows
          - os: windows
            arch: x86_64
            runner: windows-latest
          - os: windows
            arch: aarch64
            runner: windows-11-arm
          # Linux
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: aarch64
            runner: ubuntu-latest
          # macOS
          - os: macos
            arch: x86_64
            runner: macos-15-intel
          - os: macos
            arch: aarch64
            runner: macos-latest
      fail-fast: false
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set platform variables
        id: platform
        shell: bash
        run: |
          os_name="unknown"
          arch_name="unknown"

          # 架构标签
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch_name="x64"
          else
            arch_name="arm64"
          fi

          # 操作系统名（用于文件名）
          case "${{ matrix.os }}" in
            windows)
              os_name="win"
              maa_tag_tmp="${os_name}-${{ matrix.arch }}"
              ;;
            linux)
              os_name="linux"
              maa_tag_tmp="${os_name}-${{ matrix.arch }}"
              ;;
            macos)
              os_name="osx"
              maa_tag_tmp="${{ matrix.os }}-${{ matrix.arch }}"
              ;;
          esac

          # 输出变量
          echo "os_name=${os_name}" >> $GITHUB_OUTPUT
          echo "arch_name=${arch_name}" >> $GITHUB_OUTPUT
          echo "maa_tag=${maa_tag_tmp}" >> $GITHUB_OUTPUT
          echo "mfa_tag=${os_name}-${arch_name}" >> $GITHUB_OUTPUT
          
      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ steps.platform.outputs.maa_tag }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ steps.platform.outputs.mfa_tag }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup executed for ${{ matrix.os }}"
          
      - name: Setup Embed Python
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows)
              python tools/ci/setup_embed_python.py
              ;;
            linux)
              # 系统 Python 已存在
              ;;
            macos)
              python3 tools/ci/setup_embed_python.py
              EMBED_PYTHON="./install/python/bin/python3"
              [ -f "$EMBED_PYTHON" ] && chmod +x "$EMBED_PYTHON"
              ;;
          esac

      - name: Download Python dependencies
        shell: bash
        run: |
          # 提前准备依赖，加速客户端安装
          case "${{ matrix.os }}" in
            windows)
              ./install/python/python.exe tools/ci/download_deps.py --deps-dir install/deps
              ;;
            macos)
              ./install/python/bin/python3 tools/ci/download_deps.py --deps-dir install/deps
              ;;
            linux)
              python tools/ci/download_deps.py --deps-dir install/deps
              ;;
          esac

      - name: Install
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows)
              PYTHON="./install/python/python.exe"
              ;;
            linux)
              PYTHON="python"
              ;;
            macos)
              PYTHON="./install/python/bin/python3"
              ;;
          esac

          # 安装install.py依赖的jsonc库
          $PYTHON -m pip install json-with-comments

          # 运行安装脚本，传入版本号和平台标签
          $PYTHON ./tools/ci/install.py ${{ needs.meta.outputs.tag }} ${{ steps.platform.outputs.mfa_tag }}

      - name: Handle icons for different platforms
        shell: bash
        run: |
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            windows-x86_64)
              # Windows x86_64: Convert PNG to ICO and modify exe icon
              echo "Processing Windows x86_64 icon..."

              # 安装 ImageMagick
              choco install imagemagick -y

              # 转换 PNG 到 ICO
              convert docs/images/logo.png -define icon:auto-resize=256,128,64,48,32,24,16 maaPCR.ico

              # 下载 rcedit
              curl -L https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe

              # 修改 exe 图标
              ./rcedit.exe "MFA/MFAAvalonia.exe" --set-icon "maaPCR.ico"
              ;;
            windows-aarch64)
              # Windows aarch64: Skip icon processing
              echo "Skipping icon processing for Windows aarch64"
              ;;
            linux-x86_64|linux-aarch64|macos-x86_64|macos-aarch64)
              # Linux and macOS: Convert PNG to ICO (no exe modification needed)
              echo "Processing icon for ${{ matrix.os }} ${{ matrix.arch }}..."

              # 安装 ImageMagick
              case "${{ matrix.os }}" in
                linux)
                  sudo apt-get update && sudo apt-get install -y imagemagick
                  ;;
                macos)
                  brew install imagemagick
                  ;;
              esac

              # 转换 PNG 到 ICO
              convert docs/images/logo.png -define icon:auto-resize=256,128,64,48,32,24,16 maaPCR.ico
              ;;
          esac

          echo "MFAAvalonia icon modified successfully"

      - name: Copy MFA files
        shell: bash
        run: |
          if [ -d "MFA" ]; then
            echo "Copying MFA files to install directory..."
            mkdir -p install
            if [ "${{ matrix.os }}" = "windows" ]; then
              cp -rpvn MFA/. install/
              if [ -f "install/MFAAvalonia.exe" ]; then
                mv -f install/MFAAvalonia.exe install/MaaPCR.exe
              fi
            else
              rsync -av --ignore-existing MFA/ install/
              if [ -f "install/MFAAvalonia" ]; then
                mv -f install/MFAAvalonia install/MaaPCR
              fi
            fi
            # 删除原始 Assets
            rm -rf install/Assets 2>/dev/null || true

            # 复制自定义图标
            if [ -f "maaPCR.ico" ]; then
              cp maaPCR.ico install/logo.ico
              echo "Copied custom icon to install/logo.ico"
            fi
          else
            echo "MFA directory not found, skipping copy."
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: MaaPCR-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}
          path: "install"

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Check assets directory
        run: |
          ls -la assets
          if [ -z "$(ls -A assets)" ]; then
            echo "assets directory is empty"
            exit 1
          fi

      - name: Process and package artifacts
        run: |
          cd assets
          for f in *; do
            if [[ $f == *"win"* ]]; then
              (cd "$f" && zip -r "../$f.zip" .)
            else
              echo "Processing Unix artifact: $f"

              find "$f" -type f -name "MFAAvalonia*" -exec chmod +x {} \; 2>/dev/null || true
              echo "Set execute permission for all MFAAvalonia files"

              find "$f" -type f -name "MFAUpdater*" -exec chmod +x {} \; 2>/dev/null || true
              echo "Set execute permission for all MFAUpdater files"

              if [[ -f "$f/MaaPCR" ]]; then
                chmod +x "$f/MaaPCR"
                echo "Set execute permission for $f/MaaPCR"
              fi

              PYTHON_PATHS=(
                "$f/python/bin/python3"
                "$f/python/python"
                "$f/python/bin/python"
                "$f/python/python.exe"
              )
              for PYTHON_PATH in "${PYTHON_PATHS[@]}"; do
                if [[ -f "$PYTHON_PATH" ]]; then
                  chmod +x "$PYTHON_PATH"
                  echo "Set execute permission for $PYTHON_PATH"
                fi
              done

              tar -cpzf "$f.tar.gz" -C "$f" .
              echo "Created archive with preserved permissions: $f.tar.gz"
            fi
          done

      - uses: softprops/action-gh-release@v2.2.2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

        # Mirror酱为第三方分发服务，新项目默认关闭
        # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
        # https://mirrorchyan.com/
      - name: Trigger MirrorChyanUploading
        if: false
        # if: ${{ github.repository_owner == 'MaaXYZ' }}
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
